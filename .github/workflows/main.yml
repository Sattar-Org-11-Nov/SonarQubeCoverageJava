name: workflow to execute the JAVA application
on: # Events to trigger the multiple jobs
 workflow_dispatch:
 push:
   branches:
        - master
 pull_request:
   branches:
        - master
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repo
        uses: actions/checkout@v6
      - name: Install the JAVA version
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' 
          java-version: '25'  
      - name: Build the code
        uses: mvn clean package   
